name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats jq

      - name: Shellcheck
        run: shellcheck -s bash mux mux.tmux .claude/hooks/no-mistakes-gate.sh

      - name: Bats
        run: bats tests/
